<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Radar — PM roles ≥8</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a1f29;
    --card-hi: #232936;
    --text: #e8eaed;
    --text-dim: #9aa0a6;
    --accent: #7F77DD;
    --accent-hi: #9c95e8;
    --score-10: #4ade80;
    --score-9: #86efac;
    --score-8: #fbbf24;
    --status-saved: #fbbf24;       /* yellow */
    --status-applied: #4ade80;      /* green */
    --status-dismissed: #f87171;    /* light red */
    --border: #2a3140;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem 1rem;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 1rem;
  }
  h1 { font-size: 1.75rem; font-weight: 600; color: var(--accent); }
  .meta { color: var(--text-dim); font-size: 0.875rem; }

  .filters {
    margin-bottom: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .filter-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    color: var(--text-dim);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 0.5rem;
    min-width: 60px;
  }
  .filter-btn {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .filter-btn:hover { background: var(--card-hi); }
  .filter-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .clear-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px dashed var(--border);
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--text-dim); }

  .section-header {
    color: var(--text-dim);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    padding: 1.5rem 0 0.75rem 0;
    margin-top: 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .section-header::before,
  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-header.applied { color: var(--status-applied); }
  .section-header.dismissed { color: var(--status-dismissed); }
  .section-header:first-child { padding-top: 0; margin-top: 0; border-top: none; }

  .role {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 0.75rem;
    transition: opacity 0.2s, border-color 0.1s;
  }
  .role:hover { border-color: var(--accent); }
  .role.status-saved {
    border-left-color: var(--status-saved);
  }
  .role.status-applied {
    border-left-color: var(--status-applied);
  }
  .role.status-dismissed {
    border-left-color: var(--status-dismissed);
  }
  .role.status-applied,
  .role.status-dismissed {
    opacity: 0.55;
    background: transparent;
  }
  .role.status-applied:hover,
  .role.status-dismissed:hover { opacity: 0.9; }

  .role-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }
  .role-title-block { flex: 1; min-width: 0; }
  .role-title {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.25rem;
    overflow-wrap: anywhere;
  }
  .role-title a { color: inherit; text-decoration: none; }
  .role-title a:hover { color: var(--accent-hi); }
  .role-company { color: var(--text-dim); font-size: 0.95rem; }
  .score-badge {
    font-size: 1.5rem;
    font-weight: 700;
    width: 3rem;
    height: 3rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #0f1419;
  }
  .score-10 { background: var(--score-10); }
  .score-9  { background: var(--score-9); }
  .score-8  { background: var(--score-8); }

  .role-rationale { color: var(--text); margin-bottom: 0.75rem; line-height: 1.55; }
  .role-meta {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 0.75rem;
  }
  .tag {
    background: var(--card-hi);
    padding: 0.15rem 0.6rem;
    border-radius: 4px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tag-fintech  { color: #93c5fd; }
  .tag-retail   { color: #fcd34d; }
  .tag-logistics { color: #c4b5fd; }
  .tag-adjacent { color: #f9a8d4; }
  .tag-ai-strong   { color: #4ade80; }
  .tag-ai-moderate { color: #86efac; }
  .tag-ai-weak     { color: #9aa0a6; }
  .role-concerns {
    background: rgba(251, 191, 36, 0.08);
    border-left: 3px solid var(--score-8);
    padding: 0.5rem 0.75rem;
    margin-top: 0.75rem;
    border-radius: 4px;
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  .status-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
    align-items: center;
  }
  .status-btn {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 0.35rem 0.75rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .status-btn:hover { background: var(--card-hi); color: var(--text); }
  .status-btn.active.status-new      { background: var(--accent); color: white; border-color: var(--accent); }
  .status-btn.active.status-saved    { background: var(--status-saved); color: #0f1419; border-color: var(--status-saved); }
  .status-btn.active.status-applied  { background: var(--status-applied); color: #0f1419; border-color: var(--status-applied); }
  .status-btn.active.status-dismissed{ background: var(--status-dismissed); color: #0f1419; border-color: var(--status-dismissed); }
  .applied-timestamp {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-left: auto;
    font-style: italic;
  }

  .empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-dim);
  }

  footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.8rem;
    text-align: center;
  }
  footer a { color: var(--accent-hi); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>Job Radar</h1>
      <div class="meta" id="meta">Loading...</div>
    </div>
  </header>

  <div class="filters">
    <div class="filter-row">
      <span class="filter-label">Status</span>
      <button class="filter-btn" data-cat="status" data-val="new">New</button>
      <button class="filter-btn" data-cat="status" data-val="saved">Saved</button>
      <button class="filter-btn" data-cat="status" data-val="applied">Applied</button>
      <button class="filter-btn" data-cat="status" data-val="dismissed">Dismissed</button>
      <button class="clear-btn" data-cat="status" data-val="clear">Clear</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Score</span>
      <button class="filter-btn" data-cat="score" data-val="10">10</button>
      <button class="filter-btn" data-cat="score" data-val="9">9</button>
      <button class="filter-btn" data-cat="score" data-val="8">8</button>
      <span class="filter-label" style="margin-left: 1rem;">Domain</span>
      <button class="filter-btn" data-cat="domain" data-val="fintech">FinTech</button>
      <button class="filter-btn" data-cat="domain" data-val="retail">Retail</button>
      <button class="filter-btn" data-cat="domain" data-val="logistics">Logistics</button>
      <button class="clear-btn" data-cat="refine" data-val="clear">Clear refine</button>
    </div>
  </div>

  <div id="roles"></div>

  <footer>
    Threshold: ≥8 · Updated daily 6am MT · Source <a href="https://github.com/vikramyeldandi/job-moby1216-radar">github</a>
  </footer>
</div>

<script>
const STORAGE_KEY = 'job_radar_statuses_v1';

let allRoles = [];
let statuses = {};

// Active filters: each is a Set of selected values within its category.
// Empty Set = no filter applied for that category.
const activeFilters = {
  status: new Set(),  // {'new','saved','applied','dismissed'}
  score: new Set(),   // {'10','9','8'}
  domain: new Set(),  // {'fintech','retail','logistics'}
};

function loadStatusesLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    statuses = raw ? JSON.parse(raw) : {};
  } catch (e) { statuses = {}; }
}

function saveStatusesLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(statuses));
}

async function loadResults() {
  try {
    const res = await fetch('results.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allRoles = data.roles || [];
    document.getElementById('meta').textContent =
      allRoles.length + ' roles \u00b7 last run ' + new Date(data.last_run).toLocaleString();
  } catch (e) {
    document.getElementById('meta').textContent = 'No results yet \u2014 workflow has not run.';
    document.getElementById('roles').innerHTML =
      '<div class="empty">Run the workflow once via Actions \u2192 Daily Job Radar \u2192 Run workflow.</div>';
  }
}

function getStatus(roleId) {
  return (statuses[roleId] && statuses[roleId].status) || 'new';
}

function setStatus(roleId, newStatus) {
  if (newStatus === 'new') {
    delete statuses[roleId];
  } else {
    statuses[roleId] = { status: newStatus };
    if (newStatus === 'applied') {
      statuses[roleId].applied_at = new Date().toISOString();
    }
  }
  saveStatusesLocal();
  renderRoles();
}

// Hybrid filter logic:
// - Within a category: OR (any selected value matches passes)
// - Across categories: AND (must pass all categories that have any selection)
// - A category with no selections is "any" (passes everything)
function passesFilters(role) {
  // Status
  if (activeFilters.status.size > 0) {
    if (!activeFilters.status.has(getStatus(role.id))) return false;
  }
  // Score
  if (activeFilters.score.size > 0) {
    if (!activeFilters.score.has(String(role.score))) return false;
  }
  // Domain
  if (activeFilters.domain.size > 0) {
    if (!activeFilters.domain.has(role.domain)) return false;
  }
  return true;
}

function statusGroup(s) {
  if (s === 'applied') return 'applied';
  if (s === 'dismissed') return 'dismissed';
  return 'active';
}

function renderRoles() {
  const visible = allRoles.filter(passesFilters);

  // Group by status: active / applied / dismissed
  const groups = { active: [], applied: [], dismissed: [] };
  visible.forEach(function(r) { groups[statusGroup(getStatus(r.id))].push(r); });

  // Sort each group by score descending
  Object.keys(groups).forEach(function(k) {
    groups[k].sort(function(a, b) { return (b.score || 0) - (a.score || 0); });
  });

  const container = document.getElementById('roles');
  if (visible.length === 0) {
    container.innerHTML = '<div class="empty">No roles match these filters.</div>';
    return;
  }

  let html = '';
  if (groups.active.length > 0) {
    html += groups.active.map(roleCard).join('');
  }
  if (groups.applied.length > 0) {
    html += '<div class="section-header applied">Applied</div>';
    html += groups.applied.map(roleCard).join('');
  }
  if (groups.dismissed.length > 0) {
    html += '<div class="section-header dismissed">Dismissed</div>';
    html += groups.dismissed.map(roleCard).join('');
  }
  container.innerHTML = html;

  container.querySelectorAll('.status-btn').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      const roleEl = e.target.closest('.role');
      setStatus(roleEl.dataset.id, btn.dataset.status);
    });
  });
}

function roleCard(r) {
  const s = getStatus(r.id);
  const appliedAt = statuses[r.id] && statuses[r.id].applied_at;
  return ''
    + '<div class="role status-' + s + '" data-id="' + escapeHtml(r.id) + '">'
    +   '<div class="role-header">'
    +     '<div class="role-title-block">'
    +       '<div class="role-title">'
    +         '<a href="' + escapeHtml(r.url) + '" target="_blank" rel="noopener">' + escapeHtml(r.title) + '</a>'
    +       '</div>'
    +       '<div class="role-company">' + escapeHtml(r.company) + ' \u00b7 ' + escapeHtml(r.location || 'Location not stated') + '</div>'
    +     '</div>'
    +     '<div class="score-badge score-' + r.score + '">' + r.score + '</div>'
    +   '</div>'
    +   '<div class="role-rationale">' + escapeHtml(r.rationale || '') + '</div>'
    +   '<div class="role-meta">'
    +     '<span class="tag tag-' + r.domain + '">' + escapeHtml(r.domain || '') + '</span>'
    +     '<span class="tag tag-ai-' + r.ai_signal + '">AI: ' + escapeHtml(r.ai_signal || 'none') + '</span>'
    +     '<span>' + escapeHtml(r.title_fit || '') + ' fit</span>'
    +     '<span>' + (r.first_seen ? new Date(r.first_seen).toLocaleDateString() : '') + '</span>'
    +   '</div>'
    +   (r.concerns ? '<div class="role-concerns">\u26a0 ' + escapeHtml(r.concerns) + '</div>' : '')
    +   '<div class="status-bar">'
    +     '<button class="status-btn status-new ' + (s === 'new' ? 'active' : '') + '" data-status="new">New</button>'
    +     '<button class="status-btn status-saved ' + (s === 'saved' ? 'active' : '') + '" data-status="saved">Saved</button>'
    +     '<button class="status-btn status-applied ' + (s === 'applied' ? 'active' : '') + '" data-status="applied">Applied</button>'
    +     '<button class="status-btn status-dismissed ' + (s === 'dismissed' ? 'active' : '') + '" data-status="dismissed">Dismissed</button>'
    +     (appliedAt ? '<span class="applied-timestamp">applied ' + new Date(appliedAt).toLocaleDateString() + '</span>' : '')
    +   '</div>'
    + '</div>';
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, function(c) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
  });
}

function updateFilterButtonsUI() {
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    const cat = btn.dataset.cat;
    const val = btn.dataset.val;
    if (activeFilters[cat] && activeFilters[cat].has(val)) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
}

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    const cat = btn.dataset.cat;
    const val = btn.dataset.val;
    if (activeFilters[cat].has(val)) {
      activeFilters[cat].delete(val);
    } else {
      activeFilters[cat].add(val);
    }
    updateFilterButtonsUI();
    renderRoles();
  });
});

// Clear buttons
document.querySelectorAll('.clear-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    const cat = btn.dataset.cat;
    if (cat === 'refine') {
      activeFilters.score.clear();
      activeFilters.domain.clear();
    } else if (cat === 'status') {
      activeFilters.status.clear();
    }
    updateFilterButtonsUI();
    renderRoles();
  });
});

// Boot
(async function() {
  loadStatusesLocal();
  await loadResults();
  renderRoles();
})();
</script>
</body>
</html>
